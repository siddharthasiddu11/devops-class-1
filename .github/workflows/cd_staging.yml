name: Deploy to staging
on:
  push:
    branches: [ main ]

jobs:
  redeploy_everything:
    runs-on: ubuntu-latest
    name: Redeploy frontend to staging cluster
    steps:
       - run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}"" &> ~/ssh_key
          ssh -i ~/ssh_key root@64.225.145.126
          cd devops-class25.2/ && git pull
          pnpm install
          pnpm run build
          pm2 restart web
          pm2 restart http-server
          pm2 restart ws-server

